# Electricity Bill Prediction Agent Configuration

# Model Settings
model:
  algorithm: "RandomForestRegressor"
  hyperparameters:
    n_estimators: 100
    max_depth: 15
    random_state: 42
  test_split: 0.2

# Feature Engineering
features:
  seasonal_factor: true
  region_factor: true
  customer_type_factor: true
  peak_hour_factor: true
  historical_window: 12  # months

# Regional Pricing (in currency per unit)
regional_pricing:
  urban:
    base_rate: 8.50
    peak_multiplier: 1.3
  rural:
    base_rate: 6.50
    peak_multiplier: 1.1
  suburban:
    base_rate: 7.50
    peak_multiplier: 1.2

# Seasonal Adjustments
seasonal_adjustments:
  January: 1.15
  February: 1.12
  March: 1.05
  April: 0.95
  May: 1.10
  June: 1.25
  July: 1.30
  August: 1.28
  September: 1.08
  October: 0.95
  November: 1.05
  December: 1.20

# Prediction Settings
prediction:
  confidence_threshold: 0.75
  anomaly_detection: true
  generate_recommendations: true

# Agent Settings
agent:
  verbose: true
  learning_enabled: true
  feedback_collection: true
