version: '3.8'

services:
  electricity-agent:
    build: .
    container_name: electricity-bill-agent
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
